<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace</title>
    <style id="custom-theme-styles"></style>
    <style>
        :root {
            --bg: #0b0b0c;
            --surface: rgba(19, 19, 21, 0.85);
            --surface-hover: rgba(28, 28, 31, 0.95);
            --border: rgba(34, 34, 37, 0.7);
            --text-main: #f4f4f5;
            --text-muted: #71717a;
            --accent: #3b82f6;
            --base-font-size: 16px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.2s, border 0.2s, transform 0.2s; }
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background-color: var(--bg); background-size: cover; background-position: center; background-repeat: no-repeat;
        }
        body { font-size: var(--base-font-size); color: var(--text-main); padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { width: 100%; max-width: 800px; margin-bottom: 60px; }
        .logo-area h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.03em; margin-bottom: 6px; }
        .logo-area p { font-size: 0.85rem; color: var(--text-muted); }
        .container { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 40px; }
        .section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-muted); margin-bottom: 16px; font-weight: 700; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
        .card { background: var(--surface); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border: 1px solid var(--border); padding: 16px; border-radius: 8px; text-decoration: none; color: inherit; display: block; }
        .card:hover { border-color: rgba(63, 63, 70, 0.9); background: var(--surface-hover); transform: translateY(-2px); }
        .card-title { font-size: 0.95rem; font-weight: 500; margin-bottom: 4px; }
        .card-desc { font-size: 0.8rem; color: var(--text-muted); line-height: 1.4; }
    </style>
</head>
<body>
    <div class="bg-overlay" id="bg-layer"></div>
    <header>
        <div class="logo-area">
            <h1 id="site-title">Workspace</h1>
            <p id="site-subtitle">精选工具与生产力控制台</p>
        </div>
    </header>
    <div class="container" id="nav-container"></div>

    <script>
        async function loadData() {
            const res = await fetch('/api/get-config');
            const currentConfig = await res.json();
            
            document.getElementById('site-title').innerText = currentConfig.title || 'Workspace';
            document.getElementById('site-subtitle').innerText = currentConfig.subtitle || '精选工具与生产力控制台';
            document.title = currentConfig.title || 'Workspace';

            // 应用外观样式
            const theme = currentConfig.theme || {};
            const bgLayer = document.getElementById('bg-layer');
            if(theme.bgUrl) {
                bgLayer.style.backgroundImage = `url('${theme.bgUrl}')`;
                bgLayer.style.filter = `blur(${theme.blur || 0}px) brightness(${theme.brightness || 100}%)`;
            }
            document.getElementById('custom-theme-styles').innerHTML = `
                body { font-family: ${theme.font || '-apple-system'} !important; --base-font-size: ${theme.fontSize || 16}px !important; }
            `;

            // 渲染网格
            const container = document.getElementById('nav-container');
            container.innerHTML = '';
            (currentConfig.categories || []).forEach(cat => {
                let html = `<div class="category"><div class="section-title">${cat.name}</div><div class="grid">`;
                cat.links.forEach(link => {
                    html += `<a href="${link.url}" target="_blank" class="card"><div class="card-title">${link.title}</div><div class="card-desc">${link.desc}</div></a>`;
                });
                html += `</div></div>`;
                container.innerHTML += html;
            });
        }
        loadData();
    </script>
</body>
</html>
